version: "3.9"

services:
  backend:
    build: .
    container_name: drive_assistant_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    container_name: drive_assistant_frontend
    working_dir: /app
    command: >
      sh -c "pip install streamlit httpx --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: drive_assistant_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  redis_data:
